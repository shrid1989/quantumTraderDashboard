version: "3.8"

services:
  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantumtrader-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - IS_LOCAL=true
      - DEBUG=true
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: quantumtrader-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

# Network for services
networks:
  default:
    name: quantumtrader-network
    driver: bridge
